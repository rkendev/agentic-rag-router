# agentic-rag-router — docker compose stack
#
# Ollama is the only default service. A pure-LLM project doesn't need
# Postgres or Redis to function; they only ship when scaffolded with
# include_postgres=true / include_redis=true.
#
# All images are pinned by digest — tag rot silently breaks builds.
# To refresh a pin:
#   1. docker manifest inspect <image>:<tag>
#   2. Update the digest here.

services:
  ollama:
    image: ollama/ollama@sha256:2e7ce379d73833c6d25c30cd1bf2d3837a3c37d16e143e9b61cf8f42ba14ba9e
    container_name: agentic-rag-router-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist pulled models across container restarts. Without this,
      # every `docker compose down` throws away the ~2 GB `llama3.2:3b`
      # pull — fine in CI, wasteful locally.
      - ollama:/root/.ollama
    healthcheck:
      # `ollama list` exits 0 once the HTTP server is accepting requests.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped


  postgres:
    # pgvector image (Postgres 16 + the `vector` extension), pinned by digest.
    # Same Postgres major (16.x) as the previous `postgres` pin, so the volume
    # format is unchanged. The D2 data layer needs `CREATE EXTENSION vector`,
    # which the stock postgres image cannot provide.
    # To refresh: docker buildx imagetools inspect pgvector/pgvector:pg16
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    container_name: agentic-rag-router-postgres
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_USER: dev
      POSTGRES_DB: dev
    ports:
      # Loopback-only: this DB is a dev/test substrate, never exposed publicly
      # on the VPS. Host port 5436 dodges the host's own Postgres (5432) and the
      # other projects already bound to 5433-5435.
      - "127.0.0.1:5436:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      # pg_isready exits 0 once the server accepts connections, giving the
      # integration/smoke layers a real readiness signal to wait on.
      test: ["CMD-SHELL", "pg_isready -U dev -d dev"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped



volumes:
  ollama:

  postgres:
